services:
  api1:
    image: cleissonb/rinha-backend-2026-rust-api:v0.1.3
    platform: linux/amd64
    environment:
      API_ADDR: 0.0.0.0:8080
      API_SOCKET: /sockets/api1-http.sock
      API_FD_SOCKET: /sockets/api1-fd.sock
      RESOURCES_DIR: /app/resources
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined
    volumes:
      - sockets:/sockets
    expose:
      - "8080"
    networks:
      - rinha
    cpus: 0.485
    mem_limit: 150m
    restart: unless-stopped

  api2:
    image: cleissonb/rinha-backend-2026-rust-api:v0.1.3
    platform: linux/amd64
    environment:
      API_ADDR: 0.0.0.0:8080
      API_SOCKET: /sockets/api2-http.sock
      API_FD_SOCKET: /sockets/api2-fd.sock
      RESOURCES_DIR: /app/resources
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined
    volumes:
      - sockets:/sockets
    expose:
      - "8080"
    networks:
      - rinha
    cpus: 0.485
    mem_limit: 150m
    restart: unless-stopped

  lb:
    image: cleissonb/rinha-backend-2026-rust-lb:v0.1.3
    platform: linux/amd64
    environment:
      BACKEND1: unix:/sockets/api1-http.sock
      BACKEND2: unix:/sockets/api2-http.sock
      FD_BACKEND1: /sockets/api1-fd.sock
      FD_BACKEND2: /sockets/api2-fd.sock
      LB_ADDR: 0.0.0.0
      LB_PORT: "9999"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    security_opt:
      - seccomp:unconfined
    volumes:
      - sockets:/sockets
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    networks:
      - rinha
    cpus: 0.03
    mem_limit: 50m
    restart: unless-stopped

networks:
  rinha:
    driver: bridge

volumes:
  sockets:
